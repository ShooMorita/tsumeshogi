services:
  native:
    build:
      context: .
      dockerfile: docker/native.Dockerfile
    working_dir: /work
    environment:
      TSUME_IN_DOCKER: "1"
    volumes:
      - .:/work

  wasm:
    build:
      context: .
      dockerfile: docker/wasm.Dockerfile
    working_dir: /work
    environment:
      TSUME_IN_DOCKER: "1"
    volumes:
      - .:/work

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    working_dir: /work
    environment:
      TSUME_IN_DOCKER: "1"
    volumes:
      - .:/work
      - web_node_modules:/work/web/node_modules
    ports:
      - "5173:5173"
      - "4173:4173"

volumes:
  web_node_modules:
